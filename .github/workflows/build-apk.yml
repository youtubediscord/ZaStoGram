name: Build ZaStoGram APK

# Сборка устанавливаемого APK прямо в облаке GitHub — локально ничего ставить не нужно.
#
# Как запустить:
#   1) Вкладка Actions в репозитории -> слева "Build ZaStoGram APK" -> кнопка "Run workflow".
#   2) Дождаться зелёной галочки (первая сборка ~40-90 мин, потом быстрее за счёт кэша).
#   3) Внизу страницы запуска -> раздел "Artifacts" -> скачать APK под архитектуру телефона:
#      arm64-v8a, armeabi-v7a, x86 или x86_64.
#      Внутри .zip лежит .apk — переносишь на телефон и ставишь (разреши установку из этого источника).
#
# Для реального входа в Telegram добавь свои api_id/api_hash с https://my.telegram.org
# в Settings -> Secrets and variables -> Actions:  TELEGRAM_API_ID  и  TELEGRAM_API_HASH.
# Без них соберётся с тестовым APP_ID=4 (вход может не работать).

on:
  workflow_dispatch: {}        # ручной запуск кнопкой
  push:
    branches: [ master ]       # и автоматически при пуше в master

# Один билд на ветку: новый пуш/запуск отменяет предыдущий незавершённый, чтобы не копились
# параллельные сборки и не конкурировали за кэш.
concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: Arm64
            flavor_dir: arm64
            abi: arm64-v8a
            artifact: ZaStoGram-standalone-arm64-v8a
            ccache_key: ccache-arm64-v8a-standalone
          - flavor: Armv7
            flavor_dir: armv7
            abi: armeabi-v7a
            artifact: ZaStoGram-standalone-armeabi-v7a
            ccache_key: ccache-armeabi-v7a-standalone
          - flavor: X86
            flavor_dir: x86
            abi: x86
            artifact: ZaStoGram-standalone-x86
            ccache_key: ccache-x86-standalone
          - flavor: X64
            flavor_dir: x64
            abi: x86_64
            artifact: ZaStoGram-standalone-x86_64
            ccache_key: ccache-x86_64-standalone
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android cmdline-tools
        uses: android-actions/setup-android@v3

      - name: Install SDK / NDK / CMake (versions from the project)
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "build-tools;30.0.3" \
            "ndk;27.2.12479018" \
            "cmake;3.10.2.4988404"

      - name: Legacy dx hack (build-tools 35 reuses dx from 30.0.3)
        run: |
          BT="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/build-tools"
          sudo cp "$BT/30.0.3/dx" "$BT/35.0.0/dx"
          sudo cp "$BT/30.0.3/lib/dx.jar" "$BT/35.0.0/lib/dx.jar"

      - name: Set up ccache (caches native object files across runs)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.ccache_key }}
          max-size: 4G

      - name: Inject your api_id / api_hash (optional, from repo secrets)
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          BV=TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java
          if [ -n "$TELEGRAM_API_ID" ] && [ -n "$TELEGRAM_API_HASH" ]; then
            sed -i "s/public static int APP_ID = .*/public static int APP_ID = ${TELEGRAM_API_ID};/" "$BV"
            sed -i "s#public static String APP_HASH = .*#public static String APP_HASH = \"${TELEGRAM_API_HASH}\";#" "$BV"
            echo "Using custom api_id from secrets."
          else
            echo "::warning::No TELEGRAM_API_ID / TELEGRAM_API_HASH secrets set — building with default APP_ID=4. Login may be limited; add your own from my.telegram.org."
          fi

      - name: Enable network logs for MTProxy diagnostics
        run: |
          BV=TMessagesProj/src/main/java/org/telegram/messenger/BuildVars.java
          sed -i 's/public static boolean LOGS_ENABLED = BuildConfig.DEBUG_VERSION;/public static boolean LOGS_ENABLED = true;/' "$BV"
          sed -i 's/LOGS_ENABLED = DEBUG_VERSION || sharedPreferences.getBoolean("logsEnabled", DEBUG_VERSION);/LOGS_ENABLED = true;/' "$BV"
          echo "::warning::Telegram network logs are enabled in this APK for MTProxy debugging. Disable before public release."

      - name: Set up signing keystore (your own key, from secrets)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > TMessagesProj/config/release.keystore
            echo "Signing with your own keystore (secret KEYSTORE_BASE64)."
          else
            echo "::warning::No KEYSTORE_BASE64 secret — signing with the PUBLIC dummy key. Add your own keystore for a real fork."
          fi

      - name: Check MTProxy architecture guards
        run: python3 Tools/check_mtproxy_all.py

      - name: Check plugin Python dependency guard
        run: python3 Tools/check_plugin_python_deps.py

      - name: Check PluginUtils JavaDoc guard
        run: python3 Tools/check_plugin_utils_javadoc.py

      - name: Check ZaSto edit-history guards
        run: python3 Tools/check_zasto_edit_history_contract.py

      - name: Reset ccache stats
        run: ccache -z || true

      - name: Build Standalone APK (${{ matrix.abi }})
        env:
          USE_CCACHE: '1'
          # The NDK is reinstalled every run, so its clang gets a fresh mtime each time.
          # Hash the compiler by CONTENT (not mtime) so cached objects still hit across runs.
          CCACHE_COMPILERCHECK: content
          # Tolerate __DATE__/__TIME__ macros and fresh-checkout header timestamps.
          CCACHE_SLOPPINESS: time_macros,include_file_mtime,include_file_ctime
          # Normalize absolute paths under the workspace so the hash is run-independent.
          CCACHE_BASEDIR: ${{ github.workspace }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          chmod +x ./gradlew
          SIGN_ARGS=""
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            SIGN_ARGS="-PRELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD -PRELEASE_KEY_PASSWORD=${KEY_PASSWORD:-$KEYSTORE_PASSWORD} -PRELEASE_KEY_ALIAS=${KEY_ALIAS:-zastogram}"
          fi
          ./gradlew --build-cache --profile ":TMessagesProj_AppStandalone:assemble${{ matrix.flavor }}Standalone" $SIGN_ARGS --stacktrace

      - name: Stage APK (${{ matrix.abi }})
        run: |
          mkdir -p dist
          APK_DIR="TMessagesProj_AppStandalone/build/outputs/apk/${{ matrix.flavor_dir }}/standalone"
          APK="$(find "$APK_DIR" -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK" ]; then
            echo "::error::No APK produced for ${{ matrix.abi }}"
            exit 1
          fi
          cp "$APK" "dist/${{ matrix.artifact }}.apk"

      - name: Show ccache stats
        if: always()
        run: ccache -s || true

      - name: Upload Gradle profile report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-profile-report-${{ matrix.abi }}
          path: '**/build/reports/profile/*.html'
          if-no-files-found: ignore

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.apk
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ success() }}
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ZaStoGram-standalone-*
          path: dist-release
          merge-multiple: true

      - name: Create per-run prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="zastogram-apk-${{ github.run_number }}-${{ github.run_attempt }}"
          TITLE="ZaStoGram APK #${{ github.run_number }}.${{ github.run_attempt }}"
          shopt -s nullglob
          APKS=(dist-release/*.apk)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "::error::No APK artifacts downloaded for prerelease"
            exit 1
          fi
          gh release create "$TAG" dist-release/*.apk \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TITLE" \
            --notes "Standalone APK build from workflow run ${{ github.run_number }}, attempt ${{ github.run_attempt }}. Commit: ${GITHUB_SHA}." \
            --prerelease \
            --target "$GITHUB_SHA"
          {
            echo "### Prerelease APKs"
            echo
            for apk in "${APKS[@]}"; do
              name="$(basename "$apk")"
              echo "- [$name](https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${name})"
            done
          } >> "$GITHUB_STEP_SUMMARY"
